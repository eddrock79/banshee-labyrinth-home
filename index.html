<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Banshee Labyrinth — Staff Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0d0d0f; --surface:#17171a; --surface2:#1f1f24; --border:#2a2a30;
    --accent:#e8b84b; --accent-dim:rgba(232,184,75,0.12);
    --green:#3ecf6e; --green-dim:rgba(62,207,110,0.12);
    --red:#e85d5d; --red-dim:rgba(232,93,93,0.1);
    --text:#e8e8ec; --muted:#6b6b78;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* PIN */
  #pin-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; gap:28px; }
  #pin-screen.hidden { display:none; }
  .pin-logo { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:3px; color:var(--accent); }
  .pin-sub { font-size:12px; color:var(--muted); margin-top:-20px; letter-spacing:2px; text-transform:uppercase; }
  .pin-dots { display:flex; gap:16px; }
  .pin-dot { width:16px; height:16px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:background .15s,border-color .15s; }
  .pin-dot.filled { background:var(--accent); border-color:var(--accent); }
  .pin-dot.error { background:var(--red); border-color:var(--red); }
  .pin-error { font-size:13px; color:var(--red); height:18px; text-align:center; }
  .pin-loading { font-size:12px; color:var(--muted); height:18px; text-align:center; }
  .pin-keypad { display:grid; grid-template-columns:repeat(3,72px); gap:12px; }
  .pin-key { height:72px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; font-size:22px; font-weight:600; cursor:pointer; transition:background .15s,transform .1s; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; user-select:none; }
  .pin-key:active { background:var(--surface2); transform:scale(.94); }
  .pin-key.zero { grid-column:2; }
  .pin-key.del { font-size:16px; color:var(--muted); }

  /* APP */
  #app { display:none; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:56px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .topbar-logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--accent); }
  .topbar-date { font-size:12px; color:var(--muted); }

  /* Nav bar */
  .nav-bar { display:flex; gap:8px; background:var(--surface2); border-bottom:1px solid var(--border); padding:10px 20px; flex-wrap:wrap; }
  .nav-btn { padding:7px 16px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted); text-decoration:none; display:inline-block; transition:color .2s,border-color .2s,background .2s; -webkit-tap-highlight-color:transparent; }
  .nav-btn:hover { color:var(--text); border-color:var(--accent); }
  .nav-btn.current { background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }

  .main { max-width:700px; margin:0 auto; padding:24px 20px; }

  /* Notice board */
  .notice-board { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
  .notice-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .notice-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; color:var(--accent); }
  .notice-edit-btn { font-size:12px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .notice-edit-btn:hover { color:var(--text); }
  .notice-content { font-size:14px; color:var(--text); line-height:1.7; white-space:pre-wrap; min-height:40px; }
  .notice-content.empty { color:var(--muted); font-style:italic; }
  .notice-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; padding:12px; line-height:1.7; resize:vertical; min-height:100px; display:none; }
  .notice-textarea:focus { outline:none; border-color:var(--accent); }
  .notice-save-btn { margin-top:10px; display:none; padding:8px 18px; background:var(--accent); color:#000; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }

  /* Handover Notes */
  .handover-board { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
  .handover-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; color:var(--accent); margin-bottom:14px; }
  .handover-empty { font-size:13px; color:var(--muted); font-style:italic; }
  .handover-list { display:flex; flex-direction:column; gap:10px; }
  .handover-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
  .handover-item-source { font-size:11px; color:var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .handover-item-text { font-size:14px; color:var(--text); line-height:1.5; white-space:pre-wrap; }
  .handover-item-time { font-size:11px; color:var(--muted); margin-top:4px; }

  /* App cards */
  .section-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; color:var(--muted); margin-bottom:14px; }
  .app-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
  .app-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; text-decoration:none; color:var(--text); transition:border-color .2s,transform .15s; display:block; -webkit-tap-highlight-color:transparent; }
  .app-card:active { transform:scale(.98); }
  .app-card:hover { border-color:var(--accent); }
  .app-card-icon { font-size:28px; margin-bottom:12px; }
  .app-card-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; color:var(--accent); margin-bottom:6px; }
  .app-card-desc { font-size:13px; color:var(--muted); line-height:1.5; }
  .app-card-arrow { margin-top:14px; font-size:12px; color:var(--muted); }

  /* Supervisor modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:300; padding:20px; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; width:100%; max-width:420px; }
  .modal h3 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; margin-bottom:8px; }
  .modal p { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .modal-buttons { display:flex; gap:10px; justify-content:flex-end; }
  .btn { padding:9px 18px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:opacity .2s,transform .1s; }
  .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">⚡ Banshee</div>
  <div class="pin-sub">Staff Hub</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-loading" id="pin-loading">Loading…</div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-keypad" id="pin-keypad" style="opacity:.4;pointer-events:none">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key zero" onclick="pinKey('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">⚡ Banshee Labyrinth</div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <span class="nav-btn current">🏠 Home</span>
    <a class="nav-btn" id="nav-jobs" href="#">📋 Weekly Jobs</a>
    <a class="nav-btn" id="nav-eon" href="#">🌙 End Of Night</a>
  </div>

  <div class="main">

    <!-- Notice Board -->
    <div class="notice-board">
      <div class="notice-header">
        <div class="notice-title">📋 Notice Board</div>
        <button class="notice-edit-btn" id="notice-edit-btn" onclick="requestNoticeEdit()">✏ Edit</button>
      </div>
      <div class="notice-content" id="notice-content"></div>
      <textarea class="notice-textarea" id="notice-textarea" placeholder="Type a message for staff here…"></textarea>
      <button class="notice-save-btn" id="notice-save-btn" onclick="saveNotice()">Save Notice</button>
    </div>

    <!-- Handover Notes -->
    <div class="handover-board">
      <div class="handover-title">📝 Handover Notes</div>
      <div id="handover-list"></div>
    </div>

    <!-- App Links -->
    <div class="section-title">Apps</div>
    <div class="app-grid" id="app-grid"></div>

  </div>
</div>

<!-- SUPERVISOR MODAL -->
<div class="modal-overlay" id="super-modal">
  <div class="modal">
    <h3>Supervisor Access</h3>
    <p>Enter supervisor password to edit the notice board.</p>
    <div class="pin-dots" style="justify-content:center;margin-bottom:12px">
      <div class="pin-dot" id="spd0"></div>
      <div class="pin-dot" id="spd1"></div>
      <div class="pin-dot" id="spd2"></div>
      <div class="pin-dot" id="spd3"></div>
    </div>
    <div class="pin-error" id="super-error" style="text-align:center;margin-bottom:12px"></div>
    <div class="pin-keypad" style="margin:0 auto 16px">
      <button class="pin-key" onclick="superKey('1')">1</button>
      <button class="pin-key" onclick="superKey('2')">2</button>
      <button class="pin-key" onclick="superKey('3')">3</button>
      <button class="pin-key" onclick="superKey('4')">4</button>
      <button class="pin-key" onclick="superKey('5')">5</button>
      <button class="pin-key" onclick="superKey('6')">6</button>
      <button class="pin-key" onclick="superKey('7')">7</button>
      <button class="pin-key" onclick="superKey('8')">8</button>
      <button class="pin-key" onclick="superKey('9')">9</button>
      <button class="pin-key zero" onclick="superKey('0')">0</button>
      <button class="pin-key del" onclick="superDel()">⌫</button>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-ghost" onclick="closeSuperModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID_KEY = 'bl_home_sheet_id';
const HANDOVER_KEY = 'bl_handover_notes'; // shared key read by all apps

const APPS = [
  {
    icon: '📋',
    title: 'Weekly Jobs',
    desc: 'Daily job assignments across the week. Tap a day, assign staff, track progress.',
    url: 'https://eddrock79.github.io/banshee-labyrinth-weekly-cleaning',
    sheetParam: true,
    navId: 'nav-jobs'
  },
  {
    icon: '🌙',
    title: 'End Of Night',
    desc: "Tonight's closing checklist. Assign tasks to staff on shift.",
    url: 'https://eddrock79.github.io/banshee-labyrinth-end-of-night',
    sheetParam: false,
    navId: 'nav-eon'
  }
];

let livePin = null, liveSuper = null, pinEntry = '', superEntry = '', sheetId = '';

// ── BOOT ──
(async function boot() {
  const urlParams = new URLSearchParams(window.location.search);
  const urlSheet = urlParams.get('sheet');
  if (urlSheet) localStorage.setItem(SHEET_ID_KEY, urlSheet);
  sheetId = localStorage.getItem(SHEET_ID_KEY) || '';

  if (sessionStorage.getItem('bl_home_unlocked') === 'yes') { showApp(); return; }
  await initPIN();
})();

function showApp() {
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  loadNotice();
  renderHandover();
  renderAppGrid();
  buildNavLinks();
}

function buildNavLinks() {
  APPS.forEach(app => {
    const url = app.sheetParam && sheetId ? `${app.url}?sheet=${sheetId}` : app.url;
    const el = document.getElementById(app.navId);
    if (el) el.href = url;
  });
}

function renderAppGrid() {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = APPS.map(app => {
    const url = app.sheetParam && sheetId ? `${app.url}?sheet=${sheetId}` : app.url;
    return `<a class="app-card" href="${url}">
      <div class="app-card-icon">${app.icon}</div>
      <div class="app-card-title">${app.title}</div>
      <div class="app-card-desc">${app.desc}</div>
      <div class="app-card-arrow">Open →</div>
    </a>`;
  }).join('');
}

// ── HANDOVER NOTES ──
function renderHandover() {
  const list = document.getElementById('handover-list');
  let notes = [];
  try { notes = JSON.parse(localStorage.getItem(HANDOVER_KEY) || '[]'); } catch(e) {}
  if (!notes.length) {
    list.innerHTML = '<div class="handover-empty">No handover notes yet.</div>';
    return;
  }
  list.innerHTML = '<div class="handover-list">' + notes.map(n => `
    <div class="handover-item">
      <div class="handover-item-source">${n.source || 'Staff Note'}</div>
      <div class="handover-item-text">${escHtml(n.text)}</div>
      <div class="handover-item-time">${n.time || ''}</div>
    </div>`).join('') + '</div>';
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── PIN ──
function parseCSV(line){const cols=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}cols.push(cur.trim());return cols;}
function clean(s){return(s||'').replace(/^"|"$/g,'').trim();}

async function loadPINFromSheet(id) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=Settings`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const csv = await res.text();
    const lines = csv.split('\n').filter(l => l.trim());
    if (lines.length >= 1) { const r=parseCSV(lines[0]); const v=(clean(r[1])||clean(r[0])).trim(); if(v) livePin=v; }
    if (lines.length >= 2) { const r=parseCSV(lines[1]); const v=(clean(r[1])||clean(r[0])).trim(); if(v) liveSuper=v; }
    if (!livePin) livePin='1234';
    if (!liveSuper) liveSuper='5678';
  } catch(e) { livePin='1234'; liveSuper='5678'; }
}

async function initPIN() {
  const loadingEl = document.getElementById('pin-loading');
  const keypad = document.getElementById('pin-keypad');
  if (sheetId) { loadingEl.textContent='Loading…'; await loadPINFromSheet(sheetId); }
  else { livePin='1234'; liveSuper='5678'; }
  loadingEl.textContent = 'Enter PIN';
  keypad.style.opacity='1'; keypad.style.pointerEvents='auto';
}

function pinKey(d) { if(pinEntry.length>=4)return; pinEntry+=d; updateDots('pd',pinEntry); if(pinEntry.length===4)setTimeout(checkPIN,120); }
function pinDel() { pinEntry=pinEntry.slice(0,-1); updateDots('pd',pinEntry); document.getElementById('pin-error').textContent=''; }
function checkPIN() {
  if (pinEntry.trim()===(livePin||'').trim()) {
    sessionStorage.setItem('bl_home_unlocked','yes'); showApp();
  } else {
    for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot error';
    document.getElementById('pin-error').textContent='Incorrect PIN';
    setTimeout(()=>{ pinEntry=''; updateDots('pd',pinEntry); document.getElementById('pin-error').textContent=''; },900);
  }
}

// ── SUPERVISOR ──
function requestNoticeEdit() {
  if (sessionStorage.getItem('bl_home_super')==='yes') { openNoticeEdit(); return; }
  if (!liveSuper && sheetId) loadPINFromSheet(sheetId).then(openSuperModal);
  else openSuperModal();
}
function openSuperModal() { superEntry=''; updateDots('spd',superEntry); document.getElementById('super-error').textContent=''; document.getElementById('super-modal').classList.add('show'); }
function superKey(d) { if(superEntry.length>=4)return; superEntry+=d; updateDots('spd',superEntry); if(superEntry.length===4)setTimeout(checkSuper,120); }
function superDel() { superEntry=superEntry.slice(0,-1); updateDots('spd',superEntry); document.getElementById('super-error').textContent=''; }
function checkSuper() {
  if (superEntry.trim()===(liveSuper||'').trim()) {
    sessionStorage.setItem('bl_home_super','yes'); closeSuperModal(); openNoticeEdit();
  } else {
    for(let i=0;i<4;i++) document.getElementById('spd'+i).className='pin-dot error';
    document.getElementById('super-error').textContent='Incorrect password';
    setTimeout(()=>{ superEntry=''; updateDots('spd',superEntry); document.getElementById('super-error').textContent=''; },900);
  }
}
function closeSuperModal() { document.getElementById('super-modal').classList.remove('show'); superEntry=''; }

function updateDots(prefix, entry) {
  for(let i=0;i<4;i++) document.getElementById(prefix+i).className='pin-dot'+(i<entry.length?' filled':'');
}

// ── NOTICE BOARD ──
function loadNotice() {
  const saved = localStorage.getItem('bl_notice') || '';
  const el = document.getElementById('notice-content');
  if (saved.trim()) { el.textContent=saved; el.classList.remove('empty'); }
  else { el.textContent='No notices today.'; el.classList.add('empty'); }
}
function openNoticeEdit() {
  document.getElementById('notice-textarea').value = localStorage.getItem('bl_notice')||'';
  document.getElementById('notice-content').style.display='none';
  document.getElementById('notice-textarea').style.display='block';
  document.getElementById('notice-save-btn').style.display='inline-block';
  document.getElementById('notice-edit-btn').style.display='none';
}
function saveNotice() {
  const val = document.getElementById('notice-textarea').value.trim();
  localStorage.setItem('bl_notice', val);
  document.getElementById('notice-content').style.display='block';
  document.getElementById('notice-textarea').style.display='none';
  document.getElementById('notice-save-btn').style.display='none';
  document.getElementById('notice-edit-btn').style.display='inline-block';
  loadNotice();
}
</script>
</body>
</html>
