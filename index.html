<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Banshee Labyrinth — Staff Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0d0d0f; --surface:#17171a; --surface2:#1f1f24; --border:#2a2a30;
    --accent:#e8b84b; --accent-dim:rgba(232,184,75,0.12);
    --green:#3ecf6e; --green-dim:rgba(62,207,110,0.12);
    --red:#e85d5d; --red-dim:rgba(232,93,93,0.1);
    --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.12);
    --blue:#60a5fa; --blue-dim:rgba(96,165,250,0.12);
    --text:#e8e8ec; --muted:#6b6b78;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  /* PIN */
  #pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:24px;}
  #pin-screen.hidden{display:none;}
  .pin-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;color:var(--accent);}
  .pin-sub{font-size:12px;color:var(--muted);margin-top:-18px;letter-spacing:2px;text-transform:uppercase;}
  .pin-dots{display:flex;gap:16px;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:background .15s,border-color .15s;}
  .pin-dot.filled{background:var(--accent);border-color:var(--accent);}
  .pin-dot.error{background:var(--red);border-color:var(--red);}
  .pin-dot.super{background:var(--purple);border-color:var(--purple);}
  .pin-error{font-size:13px;color:var(--red);height:18px;text-align:center;}
  .pin-status{font-size:12px;color:var(--muted);height:18px;text-align:center;}
  .pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
  .pin-key{height:72px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none;}
  .pin-key:active{background:var(--surface2);transform:scale(.94);}
  .pin-key.zero{grid-column:2;}
  .pin-key.del{font-size:16px;color:var(--muted);}

  /* APP */
  #app{display:none;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .topbar-role{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
  .topbar-role.staff{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);}
  .topbar-role.manager{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple);}
  .topbar-date{font-size:12px;color:var(--muted);}

  .nav-bar{display:flex;gap:8px;background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 16px;flex-wrap:wrap;}
  .nav-btn{padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted);text-decoration:none;display:inline-block;transition:color .2s,border-color .2s;-webkit-tap-highlight-color:transparent;}
  .nav-btn:hover{color:var(--text);border-color:var(--accent);}
  .nav-btn.current{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
  .nav-btn.manager-only{background:var(--purple-dim);color:var(--purple);border-color:var(--purple);}

  .main{max-width:760px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:14px;}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);margin-bottom:12px;}

  /* Weather compact */
  .weather-compact{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .weather-icon-sm{font-size:28px;}
  .weather-info{display:flex;flex-direction:column;gap:2px;}
  .weather-temp-sm{font-size:20px;font-weight:600;color:var(--text);}
  .weather-meta{font-size:12px;color:var(--muted);}
  .weather-meta span{color:var(--text);}

  /* Events */
  .notice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .notice-edit-btn{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .notice-content{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap;min-height:32px;}
  .notice-content.empty{color:var(--muted);font-style:italic;}
  .notice-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px;line-height:1.7;resize:vertical;min-height:90px;display:none;}
  .notice-textarea:focus{outline:none;border-color:var(--accent);}
  .notice-save-btn{margin-top:8px;display:none;padding:8px 18px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}

  /* On shift */
  .shift-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .shift-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;background:var(--green-dim);border:1px solid rgba(62,207,110,0.3);font-size:13px;color:var(--green);}
  .shift-chip.eon{background:var(--purple-dim);border-color:rgba(167,139,250,0.3);color:var(--purple);}
  .shift-empty{font-size:13px;color:var(--muted);font-style:italic;}

  /* Handover notes */
  .handover-list{display:flex;flex-direction:column;gap:8px;}
  .handover-item{padding:10px 12px 10px 14px;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;background:var(--surface2);}
  .handover-source{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
  .handover-text{font-size:13px;color:var(--text);line-height:1.5;white-space:pre-wrap;}
  .handover-time{font-size:10px;color:var(--muted);margin-top:4px;}
  .handover-empty{font-size:13px;color:var(--muted);font-style:italic;}

  /* Joke */
  .joke-setup{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:8px;}
  .joke-punchline{font-size:14px;color:var(--accent);font-weight:500;line-height:1.6;}
  .joke-single{font-size:14px;color:var(--text);line-height:1.6;}
  .joke-reload{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;display:inline-block;}
  .joke-reload:hover{color:var(--text);}
  .joke-loading{font-size:13px;color:var(--muted);font-style:italic;}

  /* Special events */
  .events-list{display:flex;flex-direction:column;gap:8px;}
  .event-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
  .event-date{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--accent);min-width:52px;letter-spacing:.5px;padding-top:1px;}
  .event-name{font-size:13px;color:var(--text);font-weight:500;}
  .event-desc{font-size:11px;color:var(--muted);margin-top:2px;}

  /* Today summary */
  .today-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
  .today-row:last-child{border-bottom:none;}
  .today-label{font-size:13px;color:var(--text);}
  .today-pct{font-size:13px;font-weight:500;}
  .today-bar{flex:1;margin:0 12px;background:var(--surface2);border-radius:3px;height:5px;overflow:hidden;}
  .today-bar-fill{height:100%;border-radius:3px;}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">⚡ Banshee</div>
  <div class="pin-sub">Staff Hub</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-status" id="pin-status">Loading…</div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-keypad" id="pin-keypad" style="opacity:.4;pointer-events:none">
    <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key zero" onclick="pinKey('0')">0</button><button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">⚡ Banshee Labyrinth</div>
    <div class="topbar-right">
      <div class="topbar-role" id="topbar-role"></div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
  </div>

  <div class="nav-bar">
    <span class="nav-btn current">🏠 Home</span>
    <a class="nav-btn" id="nav-wj" href="#">📋 Weekly Jobs</a>
    <a class="nav-btn" id="nav-eon" href="https://eddrock79.github.io/banshee-labyrinth-end-of-night">🌙 End Of Night</a>
    <a class="nav-btn manager-only" id="nav-dash" href="https://eddrock79.github.io/banshee-labyrinth-dashboard" style="display:none">📊 Dashboard</a>
  </div>

  <div class="main">

    <!-- Compact Weather + Notice side by side -->
    <div style="display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:stretch;">
      <div class="card" style="min-width:160px;">
        <div class="card-title" style="font-size:15px;margin-bottom:8px;">🌤 Edinburgh</div>
        <div id="weather-content"><div class="joke-loading">…</div></div>
      </div>
      <div class="card">
        <div class="notice-header">
          <div class="card-title" style="margin-bottom:0;font-size:18px;">📋 Notice Board</div>
          <button class="notice-edit-btn" id="notice-edit-btn" onclick="openNoticeEdit()" style="display:none">✏ Edit</button>
        </div>
        <div class="notice-content" id="notice-content"></div>
        <textarea class="notice-textarea" id="notice-textarea" placeholder="Type a notice for staff…"></textarea>
        <button class="notice-save-btn" id="notice-save-btn" onclick="saveNotice()">Save Notice</button>
      </div>
    </div>

    <!-- What's On Tonight -->
    <div class="card">
      <div class="card-title">🎸 What's On — This Week</div>
      <div id="events-content"><div class="joke-loading">Loading events from thebansheelabyrinth.com…</div></div>
    </div>

    <!-- Handover Notes -->
    <div class="card">
      <div class="card-title">📝 Handover Notes</div>
      <div id="handover-content"><div class="handover-empty">No notes yet.</div></div>
    </div>

    <!-- Bar Joke of the Day -->
    <div class="card">
      <div class="card-title">🍺 Bar Joke of the Day</div>
      <div id="joke-content"><div class="joke-loading">Pulling up a stool…</div></div>
      <button class="joke-reload" onclick="loadJoke()">↻ Another one</button>
    </div>

  </div>
</div>

<script>
const PIN_SHEET_ID='1n_k9VpZmqWhFuj95k0JJFewh8Vi1maYJscPASE09zwg';
const SHEET_ID_KEY='bl_home_sheet_id';
const HANDOVER_KEY='bl_handover_notes';

// Edinburgh coords
const LAT=55.9533, LON=-3.1883;

let livePin=null, liveSuper=null, pinEntry='', sheetId='', isManager=false;

// ── CSV / HELPERS ──
function parseCSV(line){const cols=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}cols.push(cur.trim());return cols;}
function clean(s){return(s||'').replace(/^"|"$/g,'').trim();}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── LOAD PINS ──
async function loadPins(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${PIN_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Settings`;
    const res=await fetch(url);if(!res.ok)throw new Error();
    const found=[];
    for(const line of (await res.text()).split('\n').filter(l=>l.trim())){
      const cols=parseCSV(line);
      const val=(clean(cols[1])||clean(cols[0])).trim();
      if(/^\d+$/.test(val))found.push(val);
      if(found.length===2)break;
    }
    livePin=found[0]||'1234';
    liveSuper=found[1]||'1111';
    // B3 = script URL
    for(const line of (await fetch(url).then(r=>r.text()).catch(()=>'').then(t=>t.split('\n').filter(l=>l.trim())))){
      const cols=parseCSV(line);
      const val=(clean(cols[1])||clean(cols[0])).trim();
      if(val.startsWith('https://script.google.com')){localStorage.setItem('bl_script_url',val);break;}
    }
  }catch(e){livePin='1234';liveSuper='1111';}
}

// ── BOOT ──
(async function boot(){
  const params=new URLSearchParams(window.location.search);
  const urlSheet=params.get('sheet');
  if(urlSheet)localStorage.setItem(SHEET_ID_KEY,urlSheet);
  sheetId=localStorage.getItem(SHEET_ID_KEY)||'';

  const sess=sessionStorage.getItem('bl_home_role');
  if(sess==='staff'||sess==='manager'){
    isManager=(sess==='manager');
    showApp();return;
  }
  document.getElementById('pin-status').textContent='Loading…';
  await loadPins();
  document.getElementById('pin-status').textContent='Enter PIN';
  const kp=document.getElementById('pin-keypad');
  kp.style.opacity='1';kp.style.pointerEvents='auto';
})();

// ── PIN ──
function pinKey(d){if(pinEntry.length>=4)return;pinEntry+=d;updateDots();if(pinEntry.length===4)setTimeout(checkPin,120);}
function pinDel(){pinEntry=pinEntry.slice(0,-1);updateDots();document.getElementById('pin-error').textContent='';}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot'+(i<pinEntry.length?' filled':'');}
function checkPin(){
  if(pinEntry===livePin){
    isManager=false;sessionStorage.setItem('bl_home_role','staff');showApp();
  }else if(pinEntry===liveSuper){
    isManager=true;sessionStorage.setItem('bl_home_role','manager');
    for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot super';
    setTimeout(showApp,300);
  }else{
    for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot error';
    document.getElementById('pin-error').textContent='Incorrect PIN';
    setTimeout(()=>{pinEntry='';updateDots();document.getElementById('pin-error').textContent='';},900);
  }
}

// ── SHOW APP ──
function showApp(){
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('app').style.display='block';

  // Topbar
  const now=new Date();
  document.getElementById('topbar-date').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const roleEl=document.getElementById('topbar-role');
  if(isManager){roleEl.textContent='⭐ Manager';roleEl.className='topbar-role manager';}
  else{roleEl.textContent='Staff';roleEl.className='topbar-role staff';}

  // Nav links
  const wjUrl=sheetId?`https://eddrock79.github.io/banshee-labyrinth-weekly-cleaning?sheet=${sheetId}`:'https://eddrock79.github.io/banshee-labyrinth-weekly-cleaning';
  document.getElementById('nav-wj').href=wjUrl;
  if(isManager){
    document.getElementById('nav-dash').style.display='inline-block';
    document.getElementById('notice-edit-btn').style.display='inline-block';
  }

  // Set session flags for other apps
  sessionStorage.setItem('bl_home_unlocked','yes');
  if(isManager){sessionStorage.setItem('bl_home_super','yes');sessionStorage.setItem('bl_home_role','manager');}
  else{sessionStorage.removeItem('bl_home_super');sessionStorage.setItem('bl_home_role','staff');}

  loadNotice();
  renderHandover();
  loadEvents();
  loadWeather();
  loadJoke();
}

// ── NOTICE BOARD ──
function loadNotice(){
  const saved=localStorage.getItem('bl_notice')||'';
  const el=document.getElementById('notice-content');
  if(saved.trim()){el.textContent=saved;el.classList.remove('empty');}
  else{el.textContent='No notices today.';el.classList.add('empty');}
}
function openNoticeEdit(){
  if(!isManager)return;
  document.getElementById('notice-textarea').value=localStorage.getItem('bl_notice')||'';
  document.getElementById('notice-content').style.display='none';
  document.getElementById('notice-textarea').style.display='block';
  document.getElementById('notice-save-btn').style.display='inline-block';
  document.getElementById('notice-edit-btn').style.display='none';
}
function saveNotice(){
  const val=document.getElementById('notice-textarea').value.trim();
  localStorage.setItem('bl_notice',val);
  document.getElementById('notice-content').style.display='block';
  document.getElementById('notice-textarea').style.display='none';
  document.getElementById('notice-save-btn').style.display='none';
  document.getElementById('notice-edit-btn').style.display=isManager?'inline-block':'none';
  loadNotice();
}

// ── HANDOVER NOTES ──
function renderHandover(){
  const el=document.getElementById('handover-content');
  let notes=[];
  try{notes=JSON.parse(localStorage.getItem(HANDOVER_KEY)||'[]');}catch(e){}
  notes=notes.filter(n=>n&&typeof n==='object'&&n.text&&n.text.trim());
  notes.sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(!notes.length){el.innerHTML='<div class="handover-empty">No handover notes this week.</div>';return;}
  el.innerHTML='<div class="handover-list">'+notes.map(n=>`
    <div class="handover-item">
      <div class="handover-source">${escHtml(n.source||'Staff note')}</div>
      <div class="handover-text">${escHtml(n.text||'')}</div>
      <div class="handover-time">${escHtml(n.time||'')}</div>
    </div>`).join('')+'</div>';
}

// ── LIVE EVENTS from thebansheelabyrinth.com ──
async function loadEvents(){
  const el=document.getElementById('events-content');
  const now=new Date();
  const todayDay=now.getHours()<7?new Date(now-864e5).getDate():now.getDate();
  const currentMonth=now.getMonth();
  const currentYear=now.getFullYear();

  const SOURCES=[
    {url:'https://www.thebansheelabyrinth.com/gigs/',label:'🎸 Gigs',color:'var(--accent)'},
    {url:'https://www.thebansheelabyrinth.com/cinema/',label:'🎬 Cinema',color:'var(--purple)'},
    {url:'https://www.thebansheelabyrinth.com/cave-bar/',label:'🍷 Cave Bar',color:'var(--green)'},
  ];

  const PROXY='https://corsproxy.io/?';
  const allEvents={};

  await Promise.all(SOURCES.map(async src=>{
    try{
      const res=await fetch(PROXY+encodeURIComponent(src.url));
      if(!res.ok)return;
      const text=await res.text();
      // Strip HTML tags
      const plain=text.replace(/<[^>]+>/g,' ').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/&#\d+;/g,'').replace(/\s+/g,' ');
      // Find day numbers and following event text
      // Pattern: isolated day number followed by event names
      const lines=plain.split(/\s{2,}/).map(l=>l.trim()).filter(Boolean);
      let currentDay=null;
      for(let i=0;i<lines.length;i++){
        const line=lines[i];
        // Check if this line is just a day number (1-31)
        if(/^\d{1,2}$/.test(line)){
          const d=parseInt(line);
          if(d>=1&&d<=31)currentDay=d;
        } else if(currentDay!==null&&currentDay>=todayDay&&currentDay<=todayDay+7){
          // This is event text for a day we care about
          const clean=line.replace(/Private Booking|KARAOKE - Cancelled|KARAOKE - cancelled|Booking|Private|booked/gi,'').trim();
          if(clean.length>2&&!clean.match(/^Mon$|^Tue$|^Wed$|^Thu$|^Fri$|^Sat$|^Sun$|^May|^June|^July|^Next|^Previous|OPENING|Copyright|Tel:|Email:|18\+/)){
            if(!allEvents[currentDay])allEvents[currentDay]=[];
            allEvents[currentDay].push({text:clean,label:src.label,color:src.color});
          }
        }
        // Reset if we hit a new month header
        if(line.match(/^(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{4}$/))currentDay=null;
      }
    }catch(e){}
  }));

  const days=Object.keys(allEvents).map(Number).sort((a,b)=>a-b);
  if(!days.length){
    el.innerHTML='<div class="handover-empty">No events found — <a href="https://www.thebansheelabyrinth.com/gigs/" target="_blank" style="color:var(--accent)">check the website</a></div>';
    return;
  }

  const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  el.innerHTML='<div class="events-list">'+days.map(day=>{
    const date=new Date(currentYear,currentMonth,day);
    const dayName=DAY_NAMES[date.getDay()];
    const isToday=day===todayDay;
    const isTomorrow=day===todayDay+1;
    const label=isToday?'TODAY':isTomorrow?'TOMORROW':`${dayName} ${day}`;
    const events=allEvents[day];
    return`<div class="event-item" style="${isToday?'border-color:var(--accent);':''}">
      <div class="event-date" style="${isToday?'color:var(--accent)':''}">${label}</div>
      <div style="flex:1;min-width:0">
        ${events.map(e=>`<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px;">
          <span style="font-size:10px;color:${e.color};font-weight:600;white-space:nowrap">${e.label}</span>
          <span class="event-name">${escHtml(e.text)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('')+'</div>';
}

// ── WEATHER ──
const WX_ICONS={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'🌨',80:'🌦',81:'🌧',82:'🌧',95:'⛈',96:'⛈',99:'⛈'};
const WX_DESC={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Showers',81:'Heavy showers',82:'Violent showers',95:'Thunderstorm',96:'Thunderstorm & hail',99:'Heavy thunderstorm'};
function wxIcon(code){return WX_ICONS[code]||'🌡';}
function wxDesc(code){return WX_DESC[code]||'Variable';}

async function loadWeather(){
  const el=document.getElementById('weather-content');
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m&timezone=Europe/London`;
    const res=await fetch(url);
    if(!res.ok)throw new Error();
    const d=await res.json();
    const cur=d.current;
    el.innerHTML=`
      <div class="weather-compact">
        <div class="weather-icon-sm">${wxIcon(cur.weathercode)}</div>
        <div class="weather-info">
          <div class="weather-temp-sm">${Math.round(cur.temperature_2m)}°C</div>
          <div class="weather-meta">${wxDesc(cur.weathercode)}</div>
          <div class="weather-meta">Feels <span>${Math.round(cur.apparent_temperature)}°</span> · Wind <span>${Math.round(cur.windspeed_10m)}km/h</span></div>
        </div>
      </div>`;
  }catch(e){
    el.innerHTML='<div class="weather-meta" style="color:var(--muted)">Weather unavailable</div>';
  }
}
